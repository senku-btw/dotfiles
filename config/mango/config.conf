Here is the updated configuration file with all inline comments safely removed from the keybindings to fix the execution error, and the application launcher successfully switched to bemenu:

Ini, TOML
# ==============================================================================
# MANGO WINDOW MANAGER (MangoWM) DEFAULT CONFIGURATION
# Location: ~/.config/mango/config.conf
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Environment & Autostart
# ------------------------------------------------------------------------------
# Set basic Wayland environment variables (applies before init)
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=QT_QPA_PLATFORM,wayland
env=GDK_BACKEND,wayland,x11

# Autostart applications (Cleaned: Non-installed daemons removed)

# ------------------------------------------------------------------------------
# 2. Window Effects & Theme (Powered by scenefx)
# ------------------------------------------------------------------------------
gappih=6               # Inner gaps between windows (pixels)
gappoh=6               # Outer gaps around screen edges
borderpx=3             # Border width in pixels

# Colors (Hex format: AARRGGBB)
focuscolor=0xc9b890ff    # Focused window border color
unfocuscolor=0x444444ff  # Unfocused window border color

# Visual Flares
blur=1                 # Enable window background blur (0 = off, 1 = on)
shadows=1              # Enable drop shadows
border_radius=8        # Window corner rounding radius
focused_opacity=1.0    # Opacity for the active window
unfocused_opacity=0.85 # Opacity for background windows

# ------------------------------------------------------------------------------
# 3. Smooth Animations
# ------------------------------------------------------------------------------
animations=1                  # Global toggle for animations
animation_type_open=slide     # Open animation style (fade, slide, scale)
animation_duration_open=400   # Duration in milliseconds
animation_type_close=fade
animation_duration_close=300

# ------------------------------------------------------------------------------
# 4. Input Devices & Keyboard Layout
# ------------------------------------------------------------------------------
xkb_rules_layout=us
repeat_rate=25                # Keyboard repeat rate
repeat_delay=600              # Keyboard repeat delay

tap_to_click=1                # Touchpad setting
mouse_natural_scrolling=0     # 1 to invert scroll direction
click_method=2                # 2 = Clickfinger (two fingers for right click)

# ------------------------------------------------------------------------------
# 5. Core Keybindings & Submaps
# ------------------------------------------------------------------------------
# Format: bind[flags]=MODIFIERS,KEY,COMMAND,PARAMETERS

# Key Mode Map definitions
keymode=common
# Fast reload without restarting session
bind=SUPER,r,reload_config    

keymode=default
# Default Terminal Emulator
bind=ALT,Return,spawn,foot           

# Default Application Launcher (Switched to bemenu-run)
bind=ALT,space,spawn,bemenu-run

# Close focused window
bind=ALT,q,killclient                  

# Exit MangoWM safely
bind=SUPER,m,quit                       

# Focus & Window Navigation
bind=ALT,Left,movefocus,l
bind=ALT,Right,movefocus,r
bind=ALT,Up,movefocus,u
bind=ALT,Down,movefocus,d

# Window Layout Controls
bind=SUPER,f,toggle_fullscreen
bind=ALT,Backslash,toggle_floating

# Tag / Workspace Navigation (Switching Workspaces 1-5)
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5

# Move active window to Tag / Workspace
bind=SUPER+SHIFT,1,movewindowtotag,1
bind=SUPER+SHIFT,2,movewindowtotag,2
bind=SUPER+SHIFT,3,movewindowtotag,3
bind=SUPER+SHIFT,4,movewindowtotag,4
bind=SUPER+SHIFT,5,movewindowtotag,5

# Layout Switching
bind=SUPER,space,nextlayout

# ------------------------------------------------------------------------------
# 6. Default Tag Layout Assignments
# ------------------------------------------------------------------------------
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:monocle
tagrule=id:4,layout_name:grid

# ------------------------------------------------------------------------------
# 7. Hardware Monitor Outputs (Stacked Top-and-Bottom Layout)
# ------------------------------------------------------------------------------
# Top Monitor (HDMI connected)
monitorrule=name:HDMI-A-1,width:2560,height:1440,refresh:60,x:0,y:0

# Bottom Monitor (DisplayPort connected)
monitorrule=name:DP-1,width:2560,height:1440,refresh:60,x:0,y:1440
