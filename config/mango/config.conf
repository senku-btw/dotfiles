# ==============================================================================
# MangoWM Starter Configuration File (~/.config/mango/config.conf)
# ==============================================================================

# ------------------------------------------------------------------------------
# Appearance & Window Effects
# ------------------------------------------------------------------------------
gappih=5               # Inner horizontal gaps between windows
borderpx=4             # Border width in pixels
focuscolor=0xc9b890ff  # Hex color code for focused window border (RGBA format)
blur=0                 # Window blur (0 = disabled, 1 = enabled)
shadows=0              # Window shadows (0 = disabled, 1 = enabled)
border_radius=6        # Corner rounding radius for windows
focused_opacity=1.0    # Opacity of the active window

# ------------------------------------------------------------------------------
# Animations
# ------------------------------------------------------------------------------
animations=1                 # Enable window animations (1 = true, 0 = false)
animation_type_open=slide    # Animation type when a window opens (e.g., slide, zoom)
animation_duration_open=400  # Animation speed in milliseconds

# ------------------------------------------------------------------------------
# Input Devices
# ------------------------------------------------------------------------------
xkb_rules_layout=us          # Keyboard layout
repeat_rate=25               # Keyboard repeat rate
tap_to_click=1               # Enable trackpad tap-to-click
mouse_natural_scrolling=0    # Reverse scrolling (0 = normal, 1 = natural)

# ------------------------------------------------------------------------------
# Environment & Autostart
# ------------------------------------------------------------------------------
# exec-once runs a program only once when MangoWM boots
exec-once=waybar             # Launches the Waybar status bar

# env sets environment variables before initialization
env=QT_QPA_PLATFORM,wayland

# ------------------------------------------------------------------------------
# Essential Keybindings
# Syntax: bind=MODIFIER,key,action,parameters
# ------------------------------------------------------------------------------

# System Controls
bind=SUPER,r,reload_config          # Reloads this configuration file
bind=SUPER,m,quit                   # Exits MangoWM back to TTY/Display Manager

# Window Management
bind=ALT,q,killclient               # Closes/kills the currently focused window
bind=SUPER,f,togglefullscreen       # Toggles fullscreen mode
bind=ALT,backslash,togglefloating   # Toggles floating mode for a window

# Navigation (Focus direction)
bind=ALT,Left,viewtoleft            # Focus window to the left
bind=ALT,Right,viewtoright          # Focus window to the right
bind=ALT,Up,viewtoup                # Focus window up
bind=ALT,Down,viewtodown            # Focus window down

# Launchers (Ensure you have 'foot' and 'bemenu' installed)
bind=ALT,Return,spawn,foot          # Opens default terminal emulator (foot)
bind=ALT,Space,spawn,bemenu-run -i  # Opens application launcher (bemenu, case-insensitive)

# ------------------------------------------------------------------------------
# Rules & Layouts
# ------------------------------------------------------------------------------
# Assign default tag layout structures
tagrule=id:1,layout_name:tile
layerrule=animation_type_open:zoom,layer_name:bemenu

# ------------------------------------------------------------------------------
# Monitor Layout Configuration
# Syntax: monitorrule=name:MON_NAME,width:W,height:H,refresh:HZ,x:X_POS,y:Y_POS,scale:S,transform:T
# ------------------------------------------------------------------------------

# Monitor 1: Primary landscape display (1920x1080)
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1.0,transform:0

# Monitor 2: Secondary portrait display (Rotated 90 degrees)
# Placed at x:1920 because Monitor 1 takes up the first 1920 horizontal pixels.
monitorrule=name:^DP-1$,width:1920,height:1080,refresh:60,x:1920,y:0,scale:1.0,transform:1
